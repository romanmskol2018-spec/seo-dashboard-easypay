# Конфигурация деплоя на Render (https://render.com)
# Render прочитает этот файл при создании Blueprint и настроит сервис.
services:
  - type: web
    name: seo-dashboard-easypay
    runtime: node
    plan: free
    # --include=dev обязателен: при NODE_ENV=production npm пропускает
    # devDependencies (tailwind, typescript), а они нужны для сборки.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      # Значения вводятся в интерфейсе Render при деплое (секреты не в репозитории)
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      # Токены для импорта прямо из админки (кнопки «Обновить»).
      # Секреты вводятся в интерфейсе Render (Environment), значений в репозитории нет.
      - key: YANDEX_METRIKA_TOKEN
        sync: false
      - key: TOPVISOR_USER_ID
        sync: false
      - key: TOPVISOR_API_KEY
        sync: false
      - key: TOPVISOR_PROJECT_ID
        sync: false
      - key: TOPVISOR_REGION_INDEX
        value: "1"
